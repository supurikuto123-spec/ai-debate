<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020c1f"/>
      <stop offset="100%" style="stop-color:#0a0020"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#8000ff"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Glow effects -->
  <circle cx="170" cy="256" r="90" fill="rgba(0,255,255,0.08)" filter="url(#blur)"/>
  <circle cx="342" cy="256" r="90" fill="rgba(255,0,255,0.08)" filter="url(#blur)"/>

  <!-- Left speech bubble (Agree side) -->
  <g>
    <!-- Bubble body -->
    <rect x="60" y="155" width="165" height="115" rx="22" fill="url(#glow1)" opacity="0.18"/>
    <rect x="60" y="155" width="165" height="115" rx="22" fill="none" stroke="url(#glow1)" stroke-width="3"/>
    <!-- Bubble tail -->
    <polygon points="88,270 68,310 118,270" fill="none" stroke="url(#glow1)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Lines inside (text) -->
    <rect x="82" y="184" width="120" height="9" rx="4.5" fill="#00ffff" opacity="0.6"/>
    <rect x="82" y="204" width="95" height="9" rx="4.5" fill="#00ffff" opacity="0.4"/>
    <rect x="82" y="224" width="108" height="9" rx="4.5" fill="#00ffff" opacity="0.3"/>
    <!-- Brain icon hint -->
    <text x="195" y="190" font-size="22" fill="#00ffff" opacity="0.9">🤖</text>
  </g>

  <!-- Right speech bubble (Disagree side) -->
  <g>
    <rect x="287" y="242" width="165" height="115" rx="22" fill="url(#glow2)" opacity="0.18"/>
    <rect x="287" y="242" width="165" height="115" rx="22" fill="none" stroke="url(#glow2)" stroke-width="3"/>
    <!-- Bubble tail -->
    <polygon points="424,242 444,202 394,242" fill="none" stroke="url(#glow2)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Lines inside (text) -->
    <rect x="308" y="271" width="120" height="9" rx="4.5" fill="#ff00ff" opacity="0.6"/>
    <rect x="308" y="291" width="95" height="9" rx="4.5" fill="#ff00ff" opacity="0.4"/>
    <rect x="308" y="311" width="108" height="9" rx="4.5" fill="#ff00ff" opacity="0.3"/>
    <!-- Fire icon hint -->
    <text x="313" y="271" font-size="22" fill="#ff00ff" opacity="0.9">⚡</text>
  </g>

  <!-- Center VS badge -->
  <circle cx="256" cy="256" r="38" fill="url(#bg)" stroke="none"/>
  <circle cx="256" cy="256" r="34" fill="none" stroke="url(#glow1)" stroke-width="2.5" opacity="0.7"/>
  <circle cx="256" cy="256" r="34" fill="none" stroke="url(#glow2)" stroke-width="2.5" opacity="0.7" stroke-dasharray="53 107" stroke-dashoffset="26"/>
  <text x="256" y="263" text-anchor="middle" font-size="22" font-weight="900" font-family="Arial, sans-serif" fill="url(#glow1)">AI</text>

  <!-- Decorative corner dots -->
  <circle cx="60" cy="60" r="5" fill="#00ffff" opacity="0.5"/>
  <circle cx="452" cy="60" r="5" fill="#ff00ff" opacity="0.5"/>
  <circle cx="60" cy="452" r="5" fill="#00ffff" opacity="0.3"/>
  <circle cx="452" cy="452" r="5" fill="#ff00ff" opacity="0.3"/>

  <!-- Scan line effect -->
  <rect x="60" y="490" width="392" height="2" rx="1" fill="url(#glow1)" opacity="0.4"/>
  <rect x="60" y="20" width="392" height="2" rx="1" fill="url(#glow2)" opacity="0.4"/>
</svg>
