<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03050f"/>
      <stop offset="100%" stop-color="#080018"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="magenta" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#aa00ff"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#8800ff"/>
      <stop offset="100%" stop-color="#ff00cc"/>
    </linearGradient>
    <linearGradient id="left-bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0044ff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="right-bubble" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00cc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8800ff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="256" y1="20" x2="256" y2="492" stroke="#00e5ff" stroke-width="1" opacity="0.06"/>
  <line x1="20" y1="256" x2="492" y2="256" stroke="#ff00cc" stroke-width="1" opacity="0.06"/>

  <!-- Left speech bubble (agree / Aether) -->
  <rect x="48" y="130" width="190" height="130" rx="24" fill="url(#left-bubble)"/>
  <rect x="48" y="130" width="190" height="130" rx="24" fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.85"/>
  <!-- Bubble tail -->
  <polygon points="80,260 58,310 120,260" fill="none" stroke="#00e5ff" stroke-width="2.5" stroke-linejoin="round" opacity="0.85"/>
  <!-- Text lines inside -->
  <rect x="72" y="160" width="140" height="10" rx="5" fill="#00e5ff" opacity="0.6"/>
  <rect x="72" y="182" width="110" height="10" rx="5" fill="#00e5ff" opacity="0.4"/>
  <rect x="72" y="204" width="126" height="10" rx="5" fill="#00e5ff" opacity="0.25"/>
  <!-- Aether label -->
  <text x="92" y="153" font-size="11" font-weight="700" font-family="Arial, sans-serif" fill="#00e5ff" opacity="0.55" letter-spacing="1">AETHER</text>

  <!-- Right speech bubble (disagree / Nova) -->
  <rect x="274" y="250" width="190" height="130" rx="24" fill="url(#right-bubble)"/>
  <rect x="274" y="250" width="190" height="130" rx="24" fill="none" stroke="#ff00cc" stroke-width="3" opacity="0.85"/>
  <!-- Bubble tail -->
  <polygon points="432,250 454,200 392,250" fill="none" stroke="#ff00cc" stroke-width="2.5" stroke-linejoin="round" opacity="0.85"/>
  <!-- Text lines inside -->
  <rect x="298" y="280" width="140" height="10" rx="5" fill="#ff00cc" opacity="0.6"/>
  <rect x="298" y="302" width="110" height="10" rx="5" fill="#ff00cc" opacity="0.4"/>
  <rect x="298" y="324" width="126" height="10" rx="5" fill="#ff00cc" opacity="0.25"/>
  <!-- Nova label -->
  <text x="318" y="273" font-size="11" font-weight="700" font-family="Arial, sans-serif" fill="#ff00cc" opacity="0.55" letter-spacing="1">NOVA</text>

  <!-- Center VS circle -->
  <circle cx="256" cy="256" r="50" fill="#03050f" stroke="none"/>
  <!-- Cyan arc (left) -->
  <path d="M 256 210 A 46 46 0 0 0 256 302" fill="none" stroke="#00e5ff" stroke-width="3.5" opacity="0.9"/>
  <!-- Magenta arc (right) -->
  <path d="M 256 210 A 46 46 0 0 1 256 302" fill="none" stroke="#ff00cc" stroke-width="3.5" opacity="0.9"/>
  <!-- Center text -->
  <text x="256" y="268" text-anchor="middle"
        font-size="38" font-weight="900" font-family="Arial Black, Arial, sans-serif"
        fill="url(#logo)" filter="url(#glow)" letter-spacing="-2">AI</text>

  <!-- Outer bracket left -->
  <path d="M 156 180 L 126 180 L 126 332 L 156 332" fill="none" stroke="#00e5ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Outer bracket right -->
  <path d="M 356 180 L 386 180 L 386 332 L 356 332" fill="none" stroke="#ff00cc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Decorative corner dots -->
  <circle cx="46" cy="46" r="5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="466" cy="46" r="5" fill="#ff00cc" opacity="0.5"/>
  <circle cx="46" cy="466" r="5" fill="#00e5ff" opacity="0.3"/>
  <circle cx="466" cy="466" r="5" fill="#ff00cc" opacity="0.3"/>

  <!-- Bottom scan line -->
  <rect x="80" y="484" width="352" height="2" rx="1" fill="url(#cyan)" opacity="0.4"/>
  <rect x="80" y="26" width="352" height="2" rx="1" fill="url(#magenta)" opacity="0.4"/>
</svg>
