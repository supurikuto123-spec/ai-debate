<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03050f"/>
      <stop offset="100%" stop-color="#080018"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0090ff"/>
    </linearGradient>
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#aa00ff"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#8800ff"/>
      <stop offset="100%" stop-color="#ff00cc"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle background glow -->
  <circle cx="20" cy="20" r="18" fill="#00e5ff" opacity="0.04"/>
  <circle cx="44" cy="44" r="18" fill="#ff00cc" opacity="0.04"/>

  <!-- Cross-hair scan lines -->
  <line x1="32" y1="6" x2="32" y2="58" stroke="#00e5ff" stroke-width="0.25" opacity="0.12"/>
  <line x1="6" y1="32" x2="58" y2="32" stroke="#ff00cc" stroke-width="0.25" opacity="0.12"/>

  <!-- Outer ring segments with gap -->
  <!-- Top-left arc: cyan -->
  <path d="M 32 9 A 23 23 0 0 0 32 55" fill="none" stroke="url(#cyanGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#softGlow)"/>
  <!-- Top-right arc: magenta -->
  <path d="M 32 9 A 23 23 0 0 1 32 55" fill="none" stroke="url(#magentaGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#softGlow)"/>

  <!-- Middle ring (inner) -->
  <circle cx="32" cy="32" r="15" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>

  <!-- Left bracket [ - cyan -->
  <path d="M 22 22 L 16 22 L 16 42 L 22 42" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" filter="url(#softGlow)"/>
  <!-- Right bracket ] - magenta -->
  <path d="M 42 22 L 48 22 L 48 42 L 42 42" fill="none" stroke="#ff00cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" filter="url(#softGlow)"/>

  <!-- Center "AI" text with gradient -->
  <text x="32" y="37" text-anchor="middle"
        font-size="16" font-weight="900" font-family="Arial Black,Arial,sans-serif"
        fill="url(#logoGrad)" filter="url(#glow)" letter-spacing="-0.5">AI</text>

  <!-- Corner accent dots -->
  <circle cx="10" cy="10" r="2" fill="#00e5ff" opacity="0.7"/>
  <circle cx="54" cy="10" r="2" fill="#ff00cc" opacity="0.7"/>
  <circle cx="10" cy="54" r="2" fill="#00e5ff" opacity="0.35"/>
  <circle cx="54" cy="54" r="2" fill="#ff00cc" opacity="0.35"/>

  <!-- Small accent ticks at 12/3/6/9 o'clock -->
  <line x1="32" y1="6" x2="32" y2="10" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="58" y1="32" x2="54" y2="32" stroke="#ff00cc" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="32" y1="58" x2="32" y2="54" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="6" y1="32" x2="10" y2="32" stroke="#ff00cc" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
